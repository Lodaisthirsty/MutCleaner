name: Deploy Sphinx Docs to GitHub Pages

on:
  push:
    branches: ["main"] # 当 main 分支有代码更新时触发

# 赋予 GitHub Actions 部署网页的安全权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同一时间只有一个部署任务在运行，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          # 极其优雅的一步：直接安装 dev 套餐，瞬间备齐 Sphinx、主题和全部依赖
          pip install .[dev]

      - name: Build Sphinx documentation
        run: |
          # 进入你的 doc 文件夹并唤醒 Sphinx 引擎
          cd doc
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 将最终渲染好的网页产物打包（注意路径要对）
          path: 'doc/build/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4